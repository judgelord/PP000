# On quarto websites, see https://quarto.org/docs/reference/projects/websites.html
# On publishing with github pages, see https://quarto.org/docs/publishing/github-pages.html
project:
  type: website
  output-dir: docs

# see https://quarto.org/docs/websites/website-navigation.html
website:
  title: "PubPol 000"
  image: "figs/preview.png"
  navbar:
    left:
      - href: syllabus.qmd
        text: Syllabus
      - href: assignments.qmd
        text: Assignments
      - href: slides  # Delete these two lines to remove the slides tab from the navigation bar.
        text: Slides  # Unless you delete slides/index.qmd, a slides page will still available by adding "/slides" to the course URL
        aria-label: Slides #FIXME Is this actually needed for accesibility? (I don't remember why I added this for the slides page and not the others)
      - href: accessibility.qmd
        text: Accessibility

format:
 html:
   toc: true
   toc-location: left
   theme: michigan.scss
   include-after-body: assets/accessibility-fixes.js
   # accessibility checks; see https://quarto.org/docs/output-formats/html-accessibility.html
   axe:
    output: console
    # output: document # Makes accessability report appear on the web pages

number-depth: 3

execute:
  freeze: auto  # re-render code only when source file changes

bibliography: assets/course.bib
